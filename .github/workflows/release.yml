name: release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: build distributions
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Build wheel and sdist
        run: uv build

      - name: Check distribution metadata
        run: uv run --with twine twine check --strict dist/*

      - name: Wheel smoke check
        run: |
          python -m venv .wheel-smoke
          . .wheel-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          python -c "import speaktome_mcp; import speaktome_mcp.server"
          python -m speaktome_mcp --help
          speaktome-mcp --help

      - name: sdist smoke check
        run: |
          python -m venv .sdist-smoke
          . .sdist-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.tar.gz
          python -c "import speaktome_mcp; import speaktome_mcp.server"
          python -m speaktome_mcp --help
          speaktome-mcp --help

      - name: Upload built distributions
        uses: actions/upload-artifact@v4
        with:
          name: release-dist
          path: |
            dist/*.whl
            dist/*.tar.gz
          if-no-files-found: error

  github-release:
    name: create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dist
          path: dist

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" dist/*.whl dist/*.tar.gz --generate-notes

  pypi-publish:
    name: publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dist
          path: dist

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
